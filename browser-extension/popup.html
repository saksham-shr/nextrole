<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>NextRole Job Capture</title>
  <style>
    body { font-family: Arial, sans-serif; width: 360px; margin: 0; padding: 12px; background: #f7f7f7; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    label { display: block; font-size: 12px; margin: 8px 0 4px; }
    input, textarea { width: 100%; box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px; padding: 8px; font-size: 12px; }
    textarea { min-height: 90px; resize: vertical; }
    button { width: 100%; margin-top: 10px; border: 0; border-radius: 8px; padding: 10px; background: #111; color: #fff; font-weight: 600; cursor: pointer; }
    .muted { color: #666; font-size: 11px; margin-top: 6px; }
    .ok { color: #0f766e; }
    .err { color: #b91c1c; }
  </style>
</head>
<body>
  <h1>Send job to NextRole pipeline</h1>
  <label>NextRole Base URL</label>
  <input id="baseUrl" placeholder="https://nextrole.live" />
  <label>Title</label>
  <input id="title" />
  <label>Company</label>
  <input id="company" />
  <label>URL</label>
  <input id="url" />
  <label>Description</label>
  <textarea id="description"></textarea>
  <button id="send">Capture + Evaluate</button>
  <div id="status" class="muted"></div>
  <script src="popup.js"></script>
</body>
</html>
