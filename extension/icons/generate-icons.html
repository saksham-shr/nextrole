<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NextRole — Generate Extension Icons</title>
  <style>
    body { font-family: monospace; background: #f7f3ec; padding: 30px; color: #1a1814; }
    canvas { border: 1px solid #ccc; margin: 8px; }
    .row { display: flex; align-items: center; gap: 16px; margin: 16px 0; }
    button {
      background: #c84a1f; color: white; border: none;
      padding: 10px 20px; border-radius: 8px; cursor: pointer;
      font-family: monospace; font-size: 13px; margin-top: 12px;
    }
    a { color: #c84a1f; }
    p { margin: 6px 0; }
  </style>
</head>
<body>
  <h2>NextRole Icon Generator</h2>
  <p>Generates <code>icon16.png</code>, <code>icon48.png</code>, <code>icon128.png</code> for the Chrome extension.</p>
  <p>Click the download links below, then place the files in <code>extension/icons/</code>.</p>

  <div id="canvases"></div>
  <div id="links"></div>

  <script>
    const SIZES = [16, 48, 128];
    const container = document.getElementById("canvases");
    const links = document.getElementById("links");

    SIZES.forEach(size => {
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      // Background: rounded rect
      const r = size * 0.22;
      ctx.fillStyle = "#C84A1F";
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, r);
      ctx.fill();

      // Chevron ">" shape in white
      ctx.strokeStyle = "#FFFDF8";
      ctx.lineWidth = size * 0.13;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      const mx = size * 0.32;
      const rx = size * 0.68;
      const t = size * 0.22;
      const mid = size * 0.5;
      const b = size * 0.78;

      ctx.beginPath();
      ctx.moveTo(mx, t);
      ctx.lineTo(rx, mid);
      ctx.lineTo(mx, b);
      ctx.stroke();

      const row = document.createElement("div");
      row.className = "row";

      const label = document.createElement("span");
      label.textContent = `${size}×${size}`;
      row.appendChild(canvas.cloneNode(true));
      row.appendChild(label);
      container.appendChild(row);

      // Download link
      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = `icon${size}.png`;
      a.textContent = `⬇ Download icon${size}.png`;
      a.style.display = "block";
      a.style.margin = "6px 0";
      links.appendChild(a);
    });
  </script>
</body>
</html>
