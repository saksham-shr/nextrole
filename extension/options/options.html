<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NextRole — Settings</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f7f3ec;
      --surface:  #fffdf8;
      --line:     #2a2620;
      --line-soft:#b8aea0;
      --fg:       #1a1814;
      --muted:    #6b6358;
      --muted2:   #9a9286;
      --accent:   #c84a1f;
      --ok:       #2f7a3a;
      --ok-bg:    rgba(47,122,58,0.1);
      --bad:      #b53a3a;
      --bad-bg:   rgba(181,58,58,0.1);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container { max-width: 460px; margin: 0 auto; }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .brand-name {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 22px;
    }

    .card-title {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted2);
      margin-bottom: 16px;
    }

    .steps {
      list-style: none;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .steps li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }
    .steps li .num {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid var(--line-soft);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      color: var(--accent);
      margin-top: 1px;
    }
    .steps li strong { color: var(--fg); }

    /* Account info */
    .account-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .account-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); flex-shrink: 0; }
    .account-email { font-size: 13px; color: var(--fg); flex: 1; word-break: break-all; }

    .server-url {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .server-url .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); flex-shrink: 0; }

    .btn-row { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
    button, .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      cursor: pointer;
      transition: opacity 0.15s;
      text-decoration: none;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-secondary { background: var(--surface); color: var(--fg); border: 1px solid var(--line-soft); }
    .btn-secondary:hover:not(:disabled) { border-color: var(--line); }
    .btn-danger    { background: var(--bad-bg); color: var(--bad); border: 1px solid rgba(181,58,58,0.25); }
    .btn-danger:hover:not(:disabled) { background: rgba(181,58,58,0.15); }

    .hidden { display: none !important; }

    .field { margin-bottom: 14px; }
    label.field-label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted2);
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 64 64" fill="none">
        <rect width="64" height="64" rx="16" fill="#C84A1F"/>
        <path d="M20 14L44 32L20 50" stroke="#FFFDF8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">NextRole</span>
    </div>

    <h1>Extension Settings</h1>
    <p class="subtitle">Manage your NextRole extension connection.</p>

    <!-- Loading -->
    <div id="section-loading">
      <p style="font-size:12px;color:var(--muted)">Loading…</p>
    </div>

    <!-- Not connected -->
    <div id="section-connect" class="hidden">
      <div class="card">
        <p class="card-title">Connect your account</p>
        <ul class="steps">
          <li>
            <span class="num">1</span>
            <span>Open <strong>nextrole.live</strong> and sign in to your account.</span>
          </li>
          <li>
            <span class="num">2</span>
            <span>Go to <strong>Dashboard → Settings → Browser Extension</strong>.</span>
          </li>
          <li>
            <span class="num">3</span>
            <span>Click <strong>"Connect Extension"</strong> — this tab will update automatically.</span>
          </li>
        </ul>
        <div class="btn-row">
          <button id="btn-open-settings" class="btn-primary">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Open NextRole Settings
          </button>
        </div>
      </div>
    </div>

    <!-- Connected -->
    <div id="section-account" class="hidden">
      <div class="card">
        <p class="card-title">Account</p>

        <div class="field">
          <label class="field-label">Connected to</label>
          <div class="server-url">
            <span class="dot"></span>
            <span id="server-url-display">—</span>
          </div>
        </div>

        <div class="field">
          <label class="field-label">Signed in as</label>
          <div class="account-row">
            <span class="account-dot"></span>
            <span id="account-email" class="account-email">—</span>
          </div>
        </div>

        <div class="btn-row">
          <button id="btn-open-dashboard" class="btn-secondary">Open Dashboard</button>
          <button id="btn-logout" class="btn-danger">Disconnect</button>
        </div>
      </div>
    </div>

  </div>
  <script src="../config.js"></script>
  <script src="options.js"></script>
</body>
</html>
