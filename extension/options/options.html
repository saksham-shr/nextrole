<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NextRole — Settings</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f7f3ec;
      --surface:  #fffdf8;
      --line:     #2a2620;
      --line-soft:#b8aea0;
      --fg:       #1a1814;
      --muted:    #6b6358;
      --muted2:   #9a9286;
      --accent:   #c84a1f;
      --ok:       #2f7a3a;
      --ok-bg:    rgba(47,122,58,0.1);
      --bad:      #b53a3a;
      --bad-bg:   rgba(181,58,58,0.1);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container { max-width: 460px; margin: 0 auto; }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .brand-name {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 22px;
    }

    .card-title {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted2);
      margin-bottom: 16px;
    }

    /* ── Login form ── */
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted2);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      padding: 9px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--fg);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }

    /* ── Account info ── */
    .account-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .account-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); flex-shrink: 0; }
    .account-email { font-size: 13px; color: var(--fg); flex: 1; word-break: break-all; }

    .server-url {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .server-url .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); flex-shrink: 0; }

    .btn-row { display: flex; gap: 8px; margin-top: 4px; }
    button {
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-secondary { background: var(--surface); color: var(--fg); border: 1px solid var(--line-soft); }
    .btn-secondary:hover:not(:disabled) { border-color: var(--line); }
    .btn-danger { background: var(--bad-bg); color: var(--bad); border: 1px solid rgba(181,58,58,0.25); }
    .btn-danger:hover:not(:disabled) { background: rgba(181,58,58,0.15); }

    .status {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
    }
    .status.ok  { display: flex; background: var(--ok-bg);  color: var(--ok);  }
    .status.err { display: flex; background: var(--bad-bg); color: var(--bad); }

    .hidden { display: none !important; }

    a.link { color: var(--accent); font-size: 12px; text-decoration: none; }
    a.link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">

    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 64 64" fill="none">
        <rect width="64" height="64" rx="16" fill="#C84A1F"/>
        <path d="M20 14L44 32L20 50" stroke="#FFFDF8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">NextRole</span>
    </div>

    <h1>Extension Settings</h1>
    <p class="subtitle">Sign in with your NextRole account to connect the extension.</p>

    <!-- Logged-out: login form -->
    <div id="section-login" class="hidden">
      <div class="card">
        <p class="card-title">Sign in</p>

        <div class="field">
          <label>Connected to</label>
          <div class="server-url">
            <span class="dot"></span>
            <span id="server-url-display">—</span>
          </div>
        </div>

        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <div class="btn-row">
          <button id="btn-sign-in" class="btn-primary">Sign in</button>
          <a id="link-signup" href="#" target="_blank" class="link" style="display:flex;align-items:center;">Sign up free →</a>
        </div>

        <div id="login-status" class="status"></div>
      </div>
    </div>

    <!-- Logged-in: account info + logout -->
    <div id="section-account" class="hidden">
      <div class="card">
        <p class="card-title">Account</p>

        <div class="field">
          <label>Connected to</label>
          <div class="server-url">
            <span class="dot"></span>
            <span id="server-url-display-2">—</span>
          </div>
        </div>

        <div class="field">
          <label>Signed in as</label>
          <div class="account-row">
            <span class="account-dot"></span>
            <span id="account-email" class="account-email">—</span>
          </div>
        </div>

        <div class="btn-row">
          <button id="btn-open-dashboard" class="btn-secondary">Open Dashboard</button>
          <button id="btn-logout" class="btn-danger">Sign out</button>
        </div>

        <div id="logout-status" class="status"></div>
      </div>
    </div>

    <!-- Loading -->
    <div id="section-loading">
      <p style="font-size:12px;color:var(--muted)">Loading…</p>
    </div>

  </div>
  <script src="../config.js"></script>
  <script src="options.js"></script>
</body>
</html>
